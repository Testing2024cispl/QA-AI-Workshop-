name: Test and Deploy

# Original `on: [push]` is preserved. workflow_dispatch is ADDED so the
# browser/OS dropdowns appear when you click "Run workflow" in the Actions tab.
# (Dropdowns never show on a push run — push has no inputs, so defaults apply.)
on:
  push:
  workflow_dispatch:
    inputs:
      browser:
        description: 'Desktop browser to run on'
        type: choice
        required: true
        default: chrome
        options:
          - chrome
          - firefox
          - safari        # desktop Safari runs on macOS / OS X only
      os:
        description: 'Desktop OS to run on'
        type: choice
        required: true
        default: Windows
        options:
          - Windows
          - macOS
      test_suite_id:
        description: 'Test Suite ID to run (blank = use the default below)'
        type: string
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest      # just an API client; the browser runs on BrowserStack
    env:
      # Hardcoded placeholders — replace with your real values.
      BS_USER: "abhiniteshgupta_mAtzgX"
      BS_KEY: "ffxsWBJnXSQSo1Jzes9a"

      # >>> Fill these with YOUR trigger/status service URLs. <<<
      # Leaving them blank makes the job stop with a clear message instead of
      # a 404 + jq crash. (Stock desktop BrowserStack Automate has no such
      # trigger-by-suite API, so these point at your own test service.)
      TRIGGER_URL: "https://eventhub.rahulshettyacademy.com/"
      STATUS_URL_BASE: "https://eventhub.rahulshettyacademy.com/"

      BROWSER: ${{ github.event.inputs.browser || 'chrome' }}
      OS: ${{ github.event.inputs.os || 'Windows' }}
      TEST_SUITE_ID: ${{ github.event.inputs.test_suite_id || '9c2817377889deb325c2b76ae1ac366aa2abbef6' }}
    steps:
      - name: Validate config
        shell: bash
        run: |
          if [[ -z "$TRIGGER_URL" || -z "$STATUS_URL_BASE" ]]; then
            echo "::error::Set TRIGGER_URL and STATUS_URL_BASE in the env block to your real endpoints. They are empty, which is why the call would 404."
            exit 1
          fi
          if [[ "$BROWSER" == "safari" && "$OS" != "macOS" ]]; then
            echo "::error::Desktop Safari only runs on macOS. Pick OS = macOS or a different browser."
            exit 1
          fi
          echo "Suite: $TEST_SUITE_ID | Browser: $BROWSER | OS: $OS"

      - name: Workshop-3
        id: trigger_test_suite
        shell: bash
        run: |
          payload=$(jq -n \
            --arg suite "$TEST_SUITE_ID" \
            --arg browser "$BROWSER" \
            --arg os "$OS" \
            '{test_suite_id: $suite, browser: $browser, os: $os}')

          # Separate the HTTP code from the body so a non-JSON error page
          # (e.g. a 404 HTML page) never gets piped into jq.
          http_code=$(curl -s -u "$BS_USER:$BS_KEY" \
            -o trigger_response.json -w "%{http_code}" \
            -X POST "$TRIGGER_URL" \
            -H "Content-Type: application/json" \
            -d "$payload")

          echo "HTTP $http_code"
          echo "Response:"; cat trigger_response.json; echo

          if [[ "$http_code" != "200" && "$http_code" != "201" ]]; then
            echo "::error::Trigger failed with HTTP $http_code (see response above)."
            exit 1
          fi

          BUILD_ID=$(jq -r '.build_id' trigger_response.json)
          if [[ -z "$BUILD_ID" || "$BUILD_ID" == "null" ]]; then
            echo "::error::No build_id in response — check the JSON field name your service returns."
            exit 1
          fi

          # Modern replacement for the deprecated ::set-output
          echo "build_id=$BUILD_ID" >> "$GITHUB_OUTPUT"
          echo "Build ID: $BUILD_ID"

      - name: Check Build Status
        shell: bash
        run: |
          buildStatus=""
          retryInterval=30
          maxRetries=40                                   # ~20 min cap so it can't hang forever
          attempt=0
          BUILD_ID="${{ steps.trigger_test_suite.outputs.build_id }}"   # fixes the broken BUILD_ID=$

          while [[ "$buildStatus" != "passed" && "$buildStatus" != "failed" ]]; do
            http_code=$(curl -s -u "$BS_USER:$BS_KEY" \
              -o status_response.json -w "%{http_code}" \
              "$STATUS_URL_BASE/$BUILD_ID")

            if [[ "$http_code" != "200" ]]; then
              echo "::error::Status check failed with HTTP $http_code"
              cat status_response.json
              exit 1
            fi

            buildStatus=$(jq -r '.build_status' status_response.json)
            echo "Attempt $((attempt + 1)): build_status = $buildStatus"

            # Safety net: stop on terminal error states too, so the loop can't spin forever.
            case "$buildStatus" in
              passed|failed) break ;;
              error|timeout) echo "Build status unstable ($buildStatus)"; exit 1 ;;
            esac

            attempt=$((attempt + 1))
            if (( attempt >= maxRetries )); then
              echo "::error::Timed out waiting for build $BUILD_ID"
              exit 1
            fi
            sleep "$retryInterval"
          done

          if [[ "$buildStatus" == "passed" ]]; then
            echo "Build passed"
            # Add further steps for actions to be taken if build passed
          elif [[ "$buildStatus" == "failed" ]]; then
            echo "Build failed"
            exit 1
          else
            echo "Build status unstable"
            exit 1
          fi
